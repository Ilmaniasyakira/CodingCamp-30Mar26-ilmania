<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense &amp; Budget Visualizer</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header id="header">
    <h1>Expense &amp; Budget Visualizer</h1>
    <button id="theme-toggle" type="button" aria-label="Toggle dark/light mode">🌙 Dark Mode</button>
  </header>

  <main id="main-content">

    <section id="balance-panel" aria-label="Total balance">
      <h2>Total Balance</h2>
      <span id="balance-amount">$0.00</span>
    </section>

    <section id="month-selector" aria-label="Filter by month">
      <label for="month-input">Filter by Month:</label>
      <input type="month" id="month-input" />
      <span id="monthly-total"></span>
    </section>

    <section id="transaction-form-section" aria-label="Add transaction">
      <h2>Add Transaction</h2>
      <form id="transaction-form" novalidate>
        <div class="form-group">
          <label for="item-name">Item Name</label>
          <input type="text" id="item-name" name="item-name" placeholder="e.g. Coffee" autocomplete="off" />
          <span class="error-msg" id="item-name-error" role="alert" hidden></span>
        </div>
        <div class="form-group">
          <label for="amount">Amount</label>
          <input type="number" id="amount" name="amount" placeholder="0.00" min="0.01" step="0.01" />
          <span class="error-msg" id="amount-error" role="alert" hidden></span>
        </div>
        <div class="form-group">
          <label for="category-select">Category</label>
          <select id="category-select" name="category">
            <option value="" disabled selected>Select category</option>
          </select>
          <span class="error-msg" id="category-error" role="alert" hidden></span>
        </div>
        <button type="submit">Add Transaction</button>
      </form>
    </section>

    <section id="category-form-section" aria-label="Add custom category">
      <h2>Add Category</h2>
      <form id="category-form" novalidate>
        <div class="form-group">
          <label for="category-name">Category Name</label>
          <input type="text" id="category-name" name="category-name" placeholder="e.g. Healthcare" autocomplete="off" />
          <span class="error-msg" id="category-name-error" role="alert" hidden></span>
        </div>
        <button type="submit">Add Category</button>
      </form>
    </section>

    <section id="transaction-list-section" aria-label="Transaction history">
      <h2>Transactions</h2>
      <ul id="transaction-list" aria-live="polite"></ul>
    </section>

    <section id="chart-panel" aria-label="Spending chart">
      <h2>Spending by Category</h2>
      <canvas id="spending-chart" role="img" aria-label="Pie chart of spending by category"></canvas>
      <p id="chart-placeholder">No transactions yet. Add one to see your spending chart.</p>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
  <script src="js/app.js"></script>
</body>
</html>
